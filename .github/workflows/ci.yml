name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build, test, coverage
    runs-on: ubuntu-latest

    # Integration tests spin up their own PostgreSQL via Testcontainers
    # (see TestcontainersConfiguration); the GitHub runner already has Docker,
    # so no service container is needed here.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and run tests with coverage
        env:
          JWT_SECRET: ci-test-secret-key-must-be-at-least-256-bits-long-for-hs256
        run: mvn -B verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'target/surefire-reports/*.xml'
          require_tests: false
