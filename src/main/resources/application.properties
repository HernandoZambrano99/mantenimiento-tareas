spring.application.name=mantenimiento
# PORT is injected by Render at runtime; falls back to 8081 locally.
server.port=${PORT:8081}

# Datasource
# Local dev default is the docker-compose Postgres. For Neon set DB_URL to:
#   jdbc:postgresql://<host>.neon.tech/<db>?sslmode=require&channel_binding=require
# Neon's `psql` style URL must be converted: drop the leading `postgresql://` user:pass,
# move credentials to DB_USERNAME / DB_PASSWORD, and prepend `jdbc:`.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mantenimiento}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Conservative pool for serverless Postgres (Neon). Bump for self-hosted Postgres.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway owns the schema. ddl-auto=validate guarantees JPA entities stay aligned.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:ChangeMeToASecretAtLeast256BitsLongForHS256_ChangeMeNow}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Bootstrap admin user. Set ADMIN_PASSWORD in production; otherwise a random one is generated and logged once.
app.bootstrap.admin.username=${ADMIN_USERNAME:admin}
app.bootstrap.admin.email=${ADMIN_EMAIL:admin@example.com}
app.bootstrap.admin.password=${ADMIN_PASSWORD:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
