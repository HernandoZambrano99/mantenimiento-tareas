# Test profile. Override JWT_SECRET / DB_URL via env in CI.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mantenimiento_test}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
app.jwt.secret=${JWT_SECRET:test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-xxx}
